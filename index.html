<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ranCheck – проверка модов Minecraft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🛡️ ranCheck</h1>
        <p>Загрузите мод Minecraft (.jar) для проверки на читы и подлинность</p>
        
        <div class="upload-area" id="dropArea">
            <p>📂 Перетащите файл сюда или нажмите для выбора</p>
            <input type="file" id="fileInput" hidden accept=".jar,.zip">
        </div>

        <div class="version-inputs">
            <label>Версия Minecraft (опционально): 
                <input type="text" id="mcVersion" placeholder="например, 1.20.1">
            </label>
            <label>Версия мода (опционально): 
                <input type="text" id="modVersion" placeholder="например, 15.8.5.12">
            </label>
            <button id="autoDetectBtn">🔍 Извлечь версии из имени</button>
        </div>

        <div id="result" class="result hidden">
            <h2>Результат проверки</h2>
            <div id="report"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
