<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ranCheck – проверка модов Minecraft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app">
        <!-- Форма входа (показывается по умолчанию) -->
        <div id="loginPanel" class="panel">
            <h1>🛡️ ranCheck</h1>
            <p>Для доступа к проверке модов введите код, полученный в Telegram-боте</p>
            <input type="text" id="codeInput" placeholder="6-значный код" maxlength="6" autocomplete="off">
            <button id="submitBtn">🔓 Получить доступ</button>
            <div id="loginMessage" style="margin-top: 1rem; color: #ffcc4c;"></div>
            <hr style="margin: 1.5rem 0;">
            <p style="font-size: 0.85rem;">Нет кода? Напишите <strong>@YourBotName</strong> команду <code>/getcode</code></p>
        </div>

        <!-- Основной интерфейс проверки модов (изначально скрыт) -->
        <div id="mainPanel" class="panel hidden">
            <h1>🛡️ ranCheck</h1>
            <p>Загрузите моды Minecraft (.jar) для проверки (до 100 файлов)</p>
            
            <div class="upload-area" id="dropArea">
                <p>📂 Перетащите файлы сюда или нажмите для выбора</p>
                <input type="file" id="fileInput" hidden accept=".jar,.zip" multiple>
            </div>

            <div class="version-inputs">
                <label>Версия Minecraft (опционально): 
                    <input type="text" id="mcVersion" placeholder="например, 1.21.4">
                </label>
                <label>Версия мода (опционально): 
                    <input type="text" id="modVersion" placeholder="например, 0.92.0">
                </label>
                <button id="autoDetectBtn">🔍 Извлечь версии из имени</button>
            </div>

            <div id="progressArea" class="progress-area hidden">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <p id="progressText"></p>
            </div>

            <div id="resultsContainer" class="results-container"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
